<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat Upload</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f7f7f7;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 300px;
      margin-top: 20px;
      border-radius: 10px;
    }

    form {
      margin-top: 20px;
      display: none;
    }

    input {
      margin: 5px;
      padding: 8px;
      width: 200px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Upload Your Cat 🐾</h1>

  <div class="box">
    <input type="file" id="fileInput" accept="image/*">
    <br>
    <img id="preview">

    <form id="catForm">
      <div>
        <input type="text" id="species" placeholder="Species (e.g. Siamese)">
      </div>
      <div>
        <input type="text" id="color" placeholder="Color">
      </div>
      <div>
        <input type="text" id="fur" placeholder="Fur Type (short, long)">
      </div>
      <div>
        <input type="text" id="other" placeholder="Other details">
      </div>
      <button type="submit">Save Cat Info</button>
    </form>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const form = document.getElementById('catForm');

    let imageData = "";

    fileInput.addEventListener('change', function() {
      const file = this.files[0];

      if (file) {
        const reader = new FileReader();

        reader.onload = function() {
          imageData = reader.result;
          preview.src = imageData;
          form.style.display = "block";
        };

        reader.readAsDataURL(file);
      }
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        species: document.getElementById('species').value,
        color: document.getElementById('color').value,
        fur: document.getElementById('fur').value,
        other: document.getElementById('other').value,
        image: imageData
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "cat-data.json";
      a.click();
    });
  </script>

</body>
</html>
